<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>gas-p RPC test</title>
  </head>
  <body>
    <button id="greet">Get greeting</button>
    <p id="result"></p>

    <button id="get-events">Get my calendar events</button>
    <button id="get-events-rejected">Try an undeclared calendar ID</button>
    <pre id="events-result"></pre>

    <script type="module">
      import { installTransportShim } from 'gas-p/client';

      installTransportShim({ endpoint: '/__gasp/rpc' });

      document.getElementById('greet').addEventListener('click', () => {
        google.script.run
          .withSuccessHandler((value) => {
            document.getElementById('result').textContent = value;
          })
          .withFailureHandler((error) => {
            document.getElementById('result').textContent = 'Error: ' + error.message;
          })
          .getGreeting('World');
      });

      document.getElementById('get-events').addEventListener('click', () => {
        google.script.run
          .withSuccessHandler((events) => {
            document.getElementById('events-result').textContent = JSON.stringify(events, null, 2);
          })
          .withFailureHandler((error) => {
            document.getElementById('events-result').textContent = 'Error: ' + error.message;
          })
          .getMyEvents();
      });

      document.getElementById('get-events-rejected').addEventListener('click', () => {
        google.script.run
          .withSuccessHandler((events) => {
            document.getElementById('events-result').textContent = JSON.stringify(events, null, 2);
          })
          .withFailureHandler((error) => {
            document.getElementById('events-result').textContent = 'Error: ' + error.message;
          })
          .getEventsForUndeclaredCalendar();
      });
    </script>
  </body>
</html>
