name: Bug report
description: Something in gas-p doesn't behave the way real Apps Script does.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect gas-p to do, and what did it do instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: >
        The smallest `gas-p.config.ts` / `.gs` snippet / `google.script.run` call that
        reproduces the issue.
      render: typescript
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gas-p version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, and whether the affected code runs in Live mode or against a shim/stub.
    validations:
      required: false
